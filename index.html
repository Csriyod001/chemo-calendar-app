                                    <div className="text-sm text-blue-800 bg-blue-50 p-3 rounded-md mb-3 border border-blue-200">
                                        <h4 className="font-bold">วิธีการใช้ยา:</h4>
                                        <p>{selectedDrug.description || 'ไม่มีข้อมูล'}</p>
                                    </div>

                                    {/* --- การแสดงฟอร์มแยกตาม Group Type --- */}
                                    {groupType === 6 ? (
                                        <div className="space-y-4">
                                            {/* ฟอร์มยาหลัก */}
                                            <div className="border-2 border-blue-300 rounded-lg p-3 bg-white relative pt-5">
                                                <div className="absolute -top-3 left-3 bg-blue-100 text-blue-800 px-2 font-bold rounded shadow-sm text-sm">ยา: {selectedDrug.drug1.name} (กลุ่ม {selectedDrug.drug1.group})</div>
                                                {renderConditionForm(selectedDrug.drug1.group, formData, handleInputChange, startFromEvening, setStartFromEvening, calcMethod, setCalcMethod, currentCycle, setCurrentCycle, false, adjustByDispensed1)}
                                                
                                                <div className="mt-3 pt-3 border-t border-blue-200">
                                                    <div className="flex justify-between items-center mb-1">
                                                        <label className="block text-gray-800 font-semibold text-sm">จำนวนเม็ดยาที่จ่าย ({selectedDrug.drug1.name})</label>
                                                    </div>
                                                    <input type="number" value={dispensedPills} onChange={(e) => setDispensedPills(e.target.value)} className="w-full p-2 border border-blue-300 rounded text-sm mb-2" placeholder="ระบุจำนวนเม็ดที่จ่าย..." min="0" onWheel={(e) => e.target.blur()} />
                                                    
                                                    <div className="mb-2 mt-2">
                                                        <label className="flex items-center space-x-2 cursor-pointer">
                                                            <input type="checkbox" checked={adjustByDispensed1} onChange={(e) => setAdjustByDispensed1(e.target.checked)} className="w-4 h-4 text-blue-600 rounded" />
                                                            <span className="text-sm font-semibold text-blue-800">ปรับปฏิทินตามจำนวนยาที่แพทย์สั่งจ่าย</span>
                                                        </label>
                                                    </div>

                                                    {calculationResults.totalPills > 0 && (
                                                        <div className={`p-2 text-xs font-bold border rounded-md ${
                                                            (!dispensedPills || parseInt(dispensedPills) === calculationResults.totalPills) 
                                                            ? 'bg-green-100 border-green-400 text-green-800' 
                                                            : (parseInt(dispensedPills) < calculationResults.totalPills ? 'bg-red-100 border-red-400 text-red-800' : 'bg-yellow-100 border-yellow-400 text-yellow-800')
                                                        }`}>
                                                            {!dispensedPills 
                                                                ? `ยอดคำนวณจากปฏิทิน: ${calculationResults.totalPills} เม็ด (${calculationResults.takeDaysCount} วัน)` 
                                                                : (parseInt(dispensedPills) === calculationResults.totalPills 
                                                                    ? (adjustByDispensed1 ? '✓ ปฏิทินถูกปรับให้ตรงตามยาที่สั่งจ่ายแล้ว' : '✓ จ่ายตรงตามปฏิทิน') 
                                                                    : `⚠️ จ่ายไม่ตรง (ปฏิทินใช้ ${calculationResults.totalPills} จ่าย ${dispensedPills}) -> ${parseInt(dispensedPills) < calculationResults.totalPills ? 'ขาด' : 'เกิน'} ${Math.abs(parseInt(dispensedPills) - calculationResults.totalPills)} เม็ด`
                                                                )
                                                            }
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            {/* ฟอร์มยารอง */}
                                            <div className="border-2 border-green-300 rounded-lg p-3 bg-white relative pt-5">
                                                <div className="absolute -top-3 left-3 bg-green-100 text-green-800 px-2 font-bold rounded shadow-sm text-sm">ยา: {selectedDrug.drug2.name} (กลุ่ม {selectedDrug.drug2.group})</div>
                                                {renderConditionForm(selectedDrug.drug2.group, formData2, handleInputChange2, startFromEvening2, setStartFromEvening2, calcMethod2, setCalcMethod2, currentCycle2, setCurrentCycle2, false, adjustByDispensed2)}
                                                
                                                <div className="mt-3 pt-3 border-t border-green-200">
                                                    <div className="flex justify-between items-center mb-1">
                                                        <label className="block text-gray-800 font-semibold text-sm">จำนวนเม็ดยาที่จ่าย ({selectedDrug.drug2.name})</label>
                                                    </div>
                                                    <input type="number" value={dispensedPills2} onChange={(e) => setDispensedPills2(e.target.value)} className="w-full p-2 border border-green-300 rounded text-sm mb-2" placeholder="ระบุจำนวนเม็ดที่จ่าย..." min="0" onWheel={(e) => e.target.blur()} />
                                                    
                                                    <div className="mb-2 mt-2">
                                                        <label className="flex items-center space-x-2 cursor-pointer">
                                                            <input type="checkbox" checked={adjustByDispensed2} onChange={(e) => setAdjustByDispensed2(e.target.checked)} className="w-4 h-4 text-green-600 rounded" />
                                                            <span className="text-sm font-semibold text-green-800">ปรับปฏิทินตามจำนวนยาที่แพทย์สั่งจ่าย</span>
                                                        </label>
                                                    </div>

                                                    {calculationResults.totalPills2 > 0 && (
                                                        <div className={`p-2 text-xs font-bold border rounded-md ${
                                                            (!dispensedPills2 || parseInt(dispensedPills2) === calculationResults.totalPills2) 
                                                            ? 'bg-green-100 border-green-400 text-green-800' 
                                                            : (parseInt(dispensedPills2) < calculationResults.totalPills2 ? 'bg-red-100 border-red-400 text-red-800' : 'bg-yellow-100 border-yellow-400 text-yellow-800')
                                                        }`}>
                                                            {!dispensedPills2 
                                                                ? `ยอดคำนวณจากปฏิทิน: ${calculationResults.totalPills2} เม็ด (${calculationResults.takeDaysCount2} วัน)` 
                                                                : (parseInt(dispensedPills2) === calculationResults.totalPills2 
                                                                    ? (adjustByDispensed2 ? '✓ ปฏิทินถูกปรับให้ตรงตามยาที่สั่งจ่ายแล้ว' : '✓ จ่ายตรงตามปฏิทิน') 
                                                                    : `⚠️ จ่ายไม่ตรง (ปฏิทินใช้ ${calculationResults.totalPills2} จ่าย ${dispensedPills2}) -> ${parseInt(dispensedPills2) < calculationResults.totalPills2 ? 'ขาด' : 'เกิน'} ${Math.abs(parseInt(dispensedPills2) - calculationResults.totalPills2)} เม็ด`
                                                                )
                                                            }
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        /* ฟอร์มยาเดี่ยวปกติ */
                                        <div className="border border-gray-300 rounded-lg p-3 bg-white">
                                            {groupType === 5 && (
                                                <div className="p-3 bg-indigo-50 border border-indigo-200 rounded-md mb-4">
                                                    <label className="block text-sm font-semibold text-indigo-800 mb-2">ตั้งค่า Freestyle</label>
                                                    <div className="mb-2">
                                                        <label className="text-sm font-medium text-gray-600 mb-1 block">เลือกยาสำหรับสูตร</label>
                                                        <select name="freestyleSubDrugId" value={freestyleConfig.subDrugId} onChange={handleInputChange} className="w-full p-2 border rounded">
                                                            <option value="">-- เลือกยาสำหรับสูตร --</option>
                                                            {DRUGS_DATA.filter(d => d.group === 1 || d.group === 2).map(drug => <option key={`fs-${drug.id}`} value={drug.id}>กลุ่ม {drug.group}: {drug.name}</option>)}
                                                        </select>
                                                    </div>
                                                    <div className="mb-2">
                                                        <label className="text-sm font-medium text-gray-600 mb-1 block">วันที่เริ่ม</label>
                                                        <PatchedDateInput name="startDate" value={formData.startDate || ''} onChange={handleInputChange} className="p-2 border rounded w-full" />
                                                    </div>
                                                    <div className="mb-2">
                                                        <label className="text-sm font-medium text-gray-600 mb-1 block">วันสิ้นสุด (ไม่บังคับ)</label>
                                                        <PatchedDateInput name="endDate" value={formData.endDate || ''} onChange={handleInputChange} className="p-2 border rounded w-full" />
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-2">
                                                        <div>
                                                            <label className="text-sm font-medium text-gray-600 mb-1 block">ทาน (วัน)</label>
                                                            <input type="number" name="freestyleOnDays" value={freestyleConfig.onDays} onChange={handleInputChange} className="p-2 border rounded w-full" min="0" onWheel={(e) => e.target.blur()} />
                                                        </div>
                                                        <div>
                                                            <label className="text-sm font-medium text-gray-600 mb-1 block">เว้น (วัน)</label>
                                                            <input type="number" name="freestyleOffDays" value={freestyleConfig.offDays} onChange={handleInputChange} className="p-2 border rounded w-full" min="0" onWheel={(e) => e.target.blur()} />
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                            
                                            {renderConditionForm(groupType, formData, handleInputChange, startFromEvening, setStartFromEvening, calcMethod, setCalcMethod, currentCycle, setCurrentCycle, selectedDrug.isComplex, adjustByDispensed1)}

                                            <div className="mt-4 p-3 bg-blue-50 border border-blue-200 rounded-md">
                                                <label className="block text-gray-700 font-semibold mb-2 text-sm">3. จำนวนเม็ดยาที่สั่งจ่ายทั้งหมด (เม็ด)</label>
                                                <input type="number" value={dispensedPills} onChange={(e) => setDispensedPills(e.target.value)} className="w-full p-2 border rounded" placeholder="ระบุจำนวนเม็ดยาที่จ่ายเพื่อตรวจสอบ..." min="0" onWheel={(e) => e.target.blur()} />
                                                <p className="text-xs text-gray-500 mt-1 mb-2">ระบบจะเปรียบเทียบกับจำนวนยาที่ต้องใช้ตามปฏิทิน</p>
                                                
                                                <div className="pt-2 border-t border-blue-200">
                                                    <label className="flex items-center space-x-2 cursor-pointer">
                                                        <input type="checkbox" checked={adjustByDispensed1} onChange={(e) => setAdjustByDispensed1(e.target.checked)} className="w-4 h-4 text-blue-600 rounded" />
                                                        <span className="text-sm font-semibold text-blue-800">ปรับปฏิทินตามจำนวนยาที่แพทย์สั่งจ่าย</span>
                                                    </label>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                  </div>

                                  {/* --- สรุปข้อมูล และการเตือนด้วยการเปลี่ยนสี --- */}
                                  {groupType !== 6 && calculationResults.totalPills > 0 && (
                                      <div className="mt-4">
                                          <div className={`p-3 rounded-md font-semibold space-y-1 border ${
                                              dispensedPills && parseInt(dispensedPills) !== calculationResults.totalPills && !adjustByDispensed1
                                              ? (parseInt(dispensedPills) < calculationResults.totalPills ? 'bg-red-100 text-red-800 border-red-300' : 'bg-yellow-100 text-yellow-800 border-yellow-300')
                                              : 'bg-green-100 text-green-800 border-green-300'
                                          }`}>
                                              <div className="flex justify-between"><span>จำนวนวันทานยา:</span><span>{calculationResults.takeDaysCount} วัน</span></div>
                                              <div className="flex justify-between"><span>จำนวนเม็ดยาทั้งหมด:</span><span>{calculationResults.totalPills} เม็ด</span></div>
                                              {dispensedPills && <div className="flex justify-between pt-1 mt-1 border-t border-current opacity-80"><span>จำนวนเม็ดยาที่แพทย์สั่งจ่าย:</span><span>{dispensedPills} เม็ด</span></div>}
                                          </div>
                                          
                                          {dispensedPills && !isNaN(parseInt(dispensedPills)) && parseInt(dispensedPills) !== calculationResults.totalPills && !adjustByDispensed1 && (
                                              <div className={`mt-2 p-3 text-sm font-bold border rounded-md ${parseInt(dispensedPills) < calculationResults.totalPills ? 'bg-red-50 border-red-400 text-red-700' : 'bg-yellow-50 border-yellow-400 text-yellow-700'}`}>
                                                  ⚠️ แจ้งเตือน: ตามการคำนวณ {calculationResults.totalPills} เม็ด แพทย์สั่งจ่าย {dispensedPills} เม็ด 
                                                  ({parseInt(dispensedPills) < calculationResults.totalPills ? 'ขาด' : 'เกิน'} {Math.abs(parseInt(dispensedPills) - calculationResults.totalPills)} เม็ด)
                                              </div>
                                          )}

                                          {dispensedPills && adjustByDispensed1 && parseInt(dispensedPills) === calculationResults.totalPills && (
                                              <div className="mt-2 p-3 text-sm font-bold border rounded-md bg-green-50 border-green-400 text-green-700">
                                                  ✓ ปฏิทินถูกปรับระยะเวลาให้สิ้นสุดตรงตามจำนวนยา {dispensedPills} เม็ด เรียบร้อยแล้ว
                                              </div>
                                          )}
                                      </div>
                                  )}

                                  <div className="mt-4">
                                      <label className="block text-gray-700 font-semibold mb-2 text-sm">{groupType === 6 ? '3. วันนัดรับยา (ถ้ามี)' : '4. วันนัดรับยา (ถ้ามี)'}</label>
                                      <PatchedDateInput 
                                          name="appointmentDateInput" 
                                          value={appointmentDateInput} 
                                          onChange={(e) => setAppointmentDateInput(e.target.value)} 
                                          className="p-2 border rounded w-full" 
                                      />
                                      <p className="text-xs text-gray-500 mt-1">กรอกวันที่นัดหมายเพื่อแสดงบนปฏิทิน</p>
                                  </div>

                                  <div className="mt-4">
                                      <label className="block text-gray-700 font-semibold mb-2 text-sm">{groupType === 6 ? '4. ข้อความเพิ่มเติม' : '5. ข้อความเพิ่มเติม'}</label>
                                      <textarea
                                          value={pharmacistNotes}
                                          onChange={(e) => setPharmacistNotes(e.target.value)}
                                          className="w-full p-2 border rounded"
                                          rows="3"
                                          placeholder="คำแนะนำเพิ่มเติมจากเภสัชกร..."
                                      />
                                  </div>
                              </div>
                            )}
                          </fieldset>

                          {error && <p className="text-red-500 text-sm mt-4 bg-red-100 p-2 rounded">{error}</p>}
                      </div>

                      <div className="lg:col-span-2">
                        <div className="bg-white p-4 rounded-lg shadow-lg no-print">
                           <CalendarHeader 
                                hn={hn} 
                                firstName={firstName} 
                                lastName={lastName} 
                                drugName={getDrugNameForDisplay()} 
                                mealInfo={getMealInfoText()} 
                                pharmacistNotes={pharmacistNotes} 
                                takeDaysCount={calculationResults.takeDaysCount}
                                totalPills={calculationResults.totalPills}
                                dispensedPills={dispensedPills}
                                adjustByDispensed1={adjustByDispensed1}
                                isCombined={groupType === 6}
                                drug2Name={getDrug2NameForDisplay()}
                                mealInfo2={getMealInfoText2()}
                                takeDaysCount2={calculationResults.takeDaysCount2}
                                totalPills2={calculationResults.totalPills2}
                                dispensedPills2={dispensedPills2}
                                adjustByDispensed2={adjustByDispensed2}
                            />
                           <div className="flex justify-between items-center mb-4">
                              <button onClick={() => changeMonth(-1)} className="no-print bg-gray-200 px-4 py-2 rounded-md hover:bg-gray-300">&lt; เดือนก่อนหน้า</button>
                              <button onClick={() => changeMonth(1)} className="no-print bg-gray-200 px-4 py-2 rounded-md hover:bg-gray-300">เดือนถัดไป &gt;</button>
                           </div>
                           <Calendar 
                                month={month} 
                                year={year} 
                                markedDays={calendarDays} 
                                mealRelationText={getMealRelationText(formData)} 
                                templateTimings={groupType === 6 ? { drug1: formData.timings, drug2: formData2.timings } : formData.timings} 
                                isCombinedGroup={groupType === 6}
                           />
                        </div>
                        {calendarDays.length > 0 && <div className="text-center mt-4 no-print"><button onClick={handlePrint} className="bg-purple-600 text-white font-bold py-2 px-6 rounded-md hover:bg-purple-700 transition">พิมพ์</button></div>}
                      </div>
                  </div>
                </main>

                <div className="hidden print:block" id="print-container">
                    {monthsToPrint.map((date, index) => (
                        <div key={`${date.year}-${date.month}`} className="print-page">
                             <CalendarHeader 
                                hn={hn} 
                                firstName={firstName} 
                                lastName={lastName} 
                                drugName={getDrugNameForDisplay()} 
                                mealInfo={getMealInfoText()} 
                                pharmacistNotes={pharmacistNotes}
                                takeDaysCount={calculationResults.takeDaysCount}
                                totalPills={calculationResults.totalPills}
                                dispensedPills={dispensedPills}
                                adjustByDispensed1={adjustByDispensed1}
                                isCombined={groupType === 6}
                                drug2Name={getDrug2NameForDisplay()}
                                mealInfo2={getMealInfoText2()}
                                takeDaysCount2={calculationResults.takeDaysCount2}
                                totalPills2={calculationResults.totalPills2}
                                dispensedPills2={dispensedPills2}
                                adjustByDispensed2={adjustByDispensed2}
                            />
                             <Calendar 
                                month={date.month} 
                                year={date.year}
                                markedDays={calendarDays}
                                mealRelationText={getMealRelationText(formData)}
                                templateTimings={groupType === 6 ? { drug1: formData.timings, drug2: formData2.timings } : formData.timings}
                                isCombinedGroup={groupType === 6}
                            />
                            {index === monthsToPrint.length - 1 && <CalendarFooter nextAppointment={nextAppointment} />}
                        </div>
                    ))}
                </div>

              </div>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<ChemoCalendarApp />);
    </script>
</body>
</html>
