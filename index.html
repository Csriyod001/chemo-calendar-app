<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ปฏิทินยาเคมีบำบัด (Chemo Calendar) - update 08/04/2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
        }
        
        @media print {
            @page {
                size: A4 portrait;
                margin: 0.8cm; /* ลด Margin ของหน้ากระดาษลงจาก 1.5cm เพื่อเพิ่มพื้นที่แนวตั้ง */
            }

            body * {
                visibility: hidden;
            }
            #print-container, #print-container * {
                visibility: visible;
            }
            
            /* FIX: บังคับให้ element ที่ซ่อนไว้ (Invisible) ต้องซ่อนจริงๆ แม้ใน Print Mode */
            #print-container .invisible, 
            #print-container .invisible * {
                visibility: hidden !important;
            }

            #print-container {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
            .no-print {
                display: none !important;
            }
            .print-page {
                page-break-after: always;
                page-break-inside: avoid;
                display: flex;
                flex-direction: column;
                justify-content: center;
                height: 95%; 
            }
            .print-page:last-child {
                page-break-after: auto;
            }

            * {
                color: #000 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .border {
                border-color: #999 !important;
            }
            [data-day-type="stop"] {
                border: 2px solid #000 !important;
            }
            [data-day-type="appointment"] {
                border: 3px double #000 !important;
            }
             [data-day-type="take"] {
                border: 1px solid #000 !important;
            }
            .day-checkbox {
                border: 1px solid #000 !important;
            }
        }
    </style>
</head>
<body class="bg-slate-100 relative">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;
        const { createRoot } = ReactDOM;

        // --- Database & Constants ---
        const DRUGS_DATA = [
            // Group 1: Continuous
            { id: 1, name: "Abiraterone (Zytiga)", group: 1, description: "รับประทานยาวันละ 1 ครั้ง ต่อเนื่องทุกวัน ขณะท้องว่าง" },
            { id: 2, name: "Axitinib", group: 1, description: "รับประทานยาวันละ 2 ครั้ง (ห่างกันประมาณ 12 ชั่วโมง) ต่อเนื่องทุกวัน" },
            { id: 3, name: "Ceritinib (Zykadia)", group: 1, description: "รับประทานยาวันละ 1 ครั้ง ต่อเนื่องทุกวัน พร้อมอาหาร" },
            { id: 4, name: "Dabrafenib/Trametinib", group: 1, description: "Dabrafenib: วันละ 2 ครั้ง, Trametinib: วันละ 1 ครั้ง, ทั้งสองตัวขณะท้องว่าง" },
            { id: 5, name: "Enzalutamide (Xtandi)", group: 1, description: "รับประทานยาวันละ 1 ครั้ง ต่อเนื่องทุกวัน" },
            { id: 6, name: "Erlotinib (Tarceva)", group: 1, description: "รับประทานยาวันละ 1 ครั้ง ต่อเนื่องทุกวัน ขณะท้องว่าง" },
            { id: 7, name: "Everolimus (Afinitor)", group: 1, description: "รับประทานยาวันละ 1 ครั้ง ต่อเนื่องทุกวัน" },
            { id: 8, name: "Gefitinib (Iressa)", group: 1, description: "รับประทานยาวันละ 1 ครั้ง ต่อเนื่องทุกวัน" },
            { id: 9, name: "Hydroxyurea (Hydrea)", group: 1, description: "รับประทานต่อเนื่องทุกวัน" },
            { id: 10, name: "Imatinib (Glivec)", group: 1, description: "รับประทานยาวันละ 1 ครั้ง ต่อเนื่องทุกวัน พร้อมอาหาร" },
            { id: 11, name: "Lapatinib (Tykerb)/letrozole", group: 1, description: "Lapatinib: รับประทานยาวันละ 1 ครั้ง ต่อเนื่องทุกวัน, Letrozole: ตามแพทย์สั่ง" },
            { id: 12, name: "Lenvatinib", group: 1, description: "รับประทานยาวันละ 1 ครั้ง ต่อเนื่องทุกวัน" },
            { id: 13, name: "Olaparib", group: 1, description: "รับประทานยาวันละ 2 ครั้ง ต่อเนื่องทุกวัน" },
            { id: 14, name: "Osimertinib (Tagrisso)", group: 1, description: "รับประทานยาวันละ 1 ครั้ง ต่อเนื่องทุกวัน" },
            { id: 15, name: "Pazopanib (Votrient)", group: 1, description: "รับประทานยาวันละ 1 ครั้ง ต่อเนื่องทุกวัน ขณะท้องว่าง" },
            { id: 16, name: "Sorafenib (Nexavar)", group: 1, description: "รับประทานยาวันละ 2 ครั้ง ต่อเนื่องทุกวัน ขณะท้องว่าง" },
            
            // Group 2: On/Off Cycles (Automated)
            { id: 17, name: "Capecitabine adjuvant", group: 2, description: "รับประทานยาวันละ 2 ครั้ง หลังอาหาร เป็นเวลา 14 วัน แล้วหยุดยา 7 วัน (1 รอบ = 21 วัน)", autoOn: 14, autoOff: 7 },
            { id: 18, name: "Capecitabine monotherapy", group: 2, description: "รับประทานยาวันละ 2 ครั้ง เป็นเวลา 14 วัน แล้วหยุดยา 7 วัน (1 รอบ = 21 วัน)", autoOn: 14, autoOff: 7 },
            { id: 19, name: "CAPEOX/XELOX", group: 2, description: "Capecitabine: รับประทานยาวันละ 2 ครั้ง เป็นเวลา 14 วัน แล้วหยุดยา 7 วัน (1 รอบ = 21 วัน)", autoOn: 14, autoOff: 7 },
            { id: 20, name: "Capecitabine/Docetaxel", group: 2, description: "Capecitabine: รับประทานยาวันละ 2 ครั้ง เป็นเวลา 14 วัน แล้วหยุดยา 7 วัน (1 รอบ = 21 วัน)", autoOn: 14, autoOff: 7 },
            { id: 21, name: "Cyclophosphamide (Endoxan)", group: 2, description: "รับประทานยาวันละ 1 ครั้ง เป็นเวลา 14 วัน แล้วหยุดยา 7 วัน", autoOn: 14, autoOff: 7 },
            { id: 22, name: "Etoposide", group: 2, description: "รับประทานยาวันละ 1-2 ครั้ง ติดต่อกัน 5 วัน แล้วเว้น 16 วัน", autoOn: 5, autoOff: 16 },
            { id: 23, name: "Lapatinib (Tykerb)/capecitabine", group: 2, description: "Lapatinib: ทุกวัน, Capecitabine: 14 วัน หยุด 7 วัน", autoOn: 14, autoOff: 7 },
            { id: 24, name: "Palbociclib (Ibrance)", group: 2, description: "รับประทานยาวันละ 1 ครั้ง เป็นเวลา 21 วัน แล้วหยุดยา 7 วัน (1 รอบ = 28 วัน)", autoOn: 21, autoOff: 7 },
            { id: 25, name: "Regorafenib (Stivarga)", group: 2, description: "รับประทานยาวันละ 1 ครั้ง เป็นเวลา 21 วัน แล้วหยุดยา 7 วัน (1 รอบ = 28 วัน)", autoOn: 21, autoOff: 7 },
            { id: 26, name: "Ribociclib (Kisqali)", group: 2, description: "รับประทานยาวันละ 1 ครั้ง เป็นเวลา 21 วัน แล้วหยุดยา 7 วัน (1 รอบ = 28 วัน)", autoOn: 21, autoOff: 7 },
            { id: 27, name: "Sunitinib (Sutent)", group: 2, description: "รับประทานยาวันละ 1 ครั้ง เป็นเวลา 4 สัปดาห์ แล้วหยุดยา 2 สัปดาห์ (1 รอบ = 6 สัปดาห์)", autoOn: 28, autoOff: 14 },
            { id: 28, name: "Tegafur/Gimeracil/Oteracil potassium (TS-ONE)", group: 2, description: "รับประทานยาวันละ 2 ครั้ง หลังอาหาร เป็นเวลา 28 วัน แล้วหยุดยา 14 วัน (1 รอบ = 42 วัน)", autoOn: 28, autoOff: 14 },
            { id: 29, name: "Temozolomide (Temodal)", group: 2, description: "รับประทานยาวันละ 1 ครั้ง ก่อนนอน ติดต่อกัน 5 วัน แล้วหยุดยา 23 วัน (1 รอบ = 28 วัน)", autoOn: 5, autoOff: 23 },
            { id: 30, name: "Trifluridine/Tipiracil (Lonsurf)", group: 2, description: "รับประทานยาวันละ 2 ครั้ง ในวันที่ 1-5 และ 8-12 ของแต่ละรอบการรักษา (หยุดยาวันที่ 6-7 และ 13-28)", isComplex: true },
            
            // Other Groups
            { id: 31, name: "Vinorelbine monotherapy PO", group: 3, description: "รับประทานยาวันละ 1 ครั้ง สัปดาห์ละ 1 ครั้ง", defaultInterval: 7 },
            { id: 32, name: "Capecitabine CCRT", group: 4, description: "รับประทานยาทุกวันจันทร์-ศุกร์ ตลอดช่วงที่ฉายรังสี" },
            { id: 33, name: "Temozolomide (Temodal) - For Radiation", group: 4, description: "รับประทานยาทุกวัน ตลอดช่วงที่ฉายรังสี" },
            { id: 34, name: "Freestyle Regimen", group: 5, description: "กำหนดรูปแบบการทานยาเอง" },

            // Group 6: Combined Regimens (ยาที่ต้องทานคู่กัน)
            { 
                id: 35, 
                name: "Dabrafenib / Trametinib", 
                group: 6, 
                description: "ยา: Dabrafenib (ทุกวัน), ยา: Trametinib (ทุกวัน)",
                drug1: { name: "Dabrafenib", group: 1 },
                drug2: { name: "Trametinib", group: 1 }
            },
            { 
                id: 36, 
                name: "Lapatinib (Tykerb) / letrozole", 
                group: 6, 
                description: "ยา: Lapatinib (ทุกวัน), ยา: Letrozole (ทุกวัน)",
                drug1: { name: "Lapatinib", group: 1 },
                drug2: { name: "Letrozole", group: 1 }
            },
            { 
                id: 37, 
                name: "Lapatinib (Tykerb) / capecitabine", 
                group: 6, 
                description: "ยา: Lapatinib (ทุกวัน), ยา: Capecitabine (14 วัน หยุด 7 วัน)",
                drug1: { name: "Lapatinib", group: 1 },
                drug2: { name: "Capecitabine", group: 2, autoOn: 14, autoOff: 7 }
            }
        ];

        const THAI_HOLIDAYS = [
            '2025-07-10', '2025-07-11', '2025-07-28', '2025-08-11', '2025-08-12', 
            '2025-10-13', '2025-10-23', '2025-12-05', '2025-12-10', 
            '2025-12-31', '2026-01-01', '2026-01-02', '2026-03-02', '2026-03-03', 
            '2026-04-06', '2026-04-13', '2026-04-14', '2026-04-15', '2026-05-04', 
            '2026-05-13', '2026-06-01', '2026-06-02', '2026-06-03', '2026-07-27', 
            '2026-07-28', '2026-07-29', '2026-08-12', '2026-10-12', '2026-10-13', 
            '2026-12-07', '2026-12-10', '2026-12-11', '2026-12-31'
        ];

        // --- Utility Functions ---
        const isWeekend = (date) => { const day = date.getDay(); return day === 0 || day === 6; };
        
        const isHoliday = (date) => {
            const year = date.getFullYear();
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const day = date.getDate().toString().padStart(2, '0');
            const dateString = `${year}-${month}-${day}`;
            return THAI_HOLIDAYS.includes(dateString);
        };

        const formatDate = (date) => {
            if (!date) return '';
            const d = date instanceof Date ? date : new Date(date);
            if (isNaN(d.getTime())) return '';
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear() + 543;
            return `${day}/${month}/${year}`;
        };

        const dateToYYYYMMDD = (date) => {
            const d = date instanceof Date ? date : new Date(date);
            if (isNaN(d)) return '';
            const year = d.getFullYear();
            const month = (d.getMonth() + 1).toString().padStart(2, '0');
            const day = d.getDate().toString().padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const parseLocalDate = (dateStr) => {
            if (!dateStr) return null;
            const [y, m, d] = dateStr.split('-').map(Number);
            return new Date(y, m - 1, d, 12, 0, 0);
        };
        
        // --- React Components ---

        const HolidayIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-8 h-8 text-gray-400">
                <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        );


        const PatchedDateInput = ({ value, onChange, ...props }) => {
            const [isEditing, setIsEditing] = useState(false);

            if (isEditing) {
                return (
                    <input
                        type="date"
                        value={value || ''}
                        onChange={onChange}
                        onBlur={() => setIsEditing(false)}
                        autoFocus
                        {...props}
                    />
                );
            }

            return (
                <input
                    type="text"
                    value={value ? formatDate(parseLocalDate(value)) : ''}
                    onFocus={() => setIsEditing(true)}
                    placeholder="วว/ดด/ปปปป"
                    readOnly 
                    {...props}
                />
            );
        };

        const CalendarHeader = ({ hn, firstName, lastName, drugName, mealInfo, pharmacistNotes, takeDaysCount, totalPills, dispensedPills, adjustByDispensed1, isCombined, drug2Name, mealInfo2, takeDaysCount2, totalPills2, dispensedPills2, adjustByDispensed2 }) => {
            // เลือกตัวเลขมาแสดง: หากเปิดโหมด Adjust และมีการกรอกตัวเลขที่แพทย์สั่งจ่าย ให้ใช้ตัวเลขนั้นแทน
            const displayTotalPills1 = (adjustByDispensed1 && dispensedPills) ? dispensedPills : totalPills;
            const displayTotalPills2 = (adjustByDispensed2 && dispensedPills2) ? dispensedPills2 : totalPills2;

            return (
                <div className="mb-4 border-b pb-4 print:mb-4 print:pb-2">
                    <h1 className="text-3xl font-bold text-center mb-4 print:text-xl print:mb-1">ปฏิทินการรับประทานยา</h1>
                    <div className="grid grid-cols-2 gap-x-8 text-gray-800 text-base print:text-sm">
                        <div>
                            <p className="mb-1 print:mb-0"><strong>HN:</strong> {hn || ''}</p>
                            <p><strong>ชื่อ:</strong> {firstName || ''} {lastName || ''}</p>
                        </div>
                        <div>
                            {isCombined ? (
                                <>
                                    <p className="mb-1 print:mb-0"><strong>ยา:</strong> <span className="text-blue-700 font-semibold">{drugName || ''}</span></p>
                                    <p className="mb-1 print:mb-0"><strong>ยา:</strong> <span className="text-green-700 font-semibold">{drug2Name || ''}</span></p>
                                </>
                            ) : (
                                <p className="mb-1 print:mb-0"><strong>ยา:</strong> {drugName || ''}</p>
                            )}
                        </div>
                    </div>
                    
                    {/* สรุปข้อมูลยา กรณีกลุ่มปกติ */}
                    {!isCombined && totalPills > 0 && (
                        <div className="mt-2 pt-2 border-t grid grid-cols-2 gap-x-8 text-base print:text-sm print:mt-1 print:pt-1">
                            <p><strong>จำนวนวันทานยา:</strong> {takeDaysCount} วัน</p>
                            <p><strong>จำนวนเม็ดยาทั้งหมด:</strong> {displayTotalPills1} เม็ด</p>
                        </div>
                    )}
                    
                    {/* สรุปข้อมูลยา กรณียาคู่ (Group 6) */}
                    {isCombined && (totalPills > 0 || totalPills2 > 0) && (
                         <div className="mt-2 pt-2 border-t grid grid-cols-2 gap-x-8 text-sm print:text-sm print:mt-1 print:pt-1">
                            <div className="bg-blue-50 p-2 rounded border border-blue-100 print:p-1 print:mb-1">
                                <p className="font-bold text-blue-800 mb-1 print:mb-0">สรุป {drugName}:</p>
                                <p>จำนวนวันทานยา: {takeDaysCount} วัน</p>
                                <p>จำนวนยาทั้งหมด: {displayTotalPills1} เม็ด</p>
                            </div>
                            <div className="bg-green-50 p-2 rounded border border-green-100 print:p-1 print:mb-1">
                                <p className="font-bold text-green-800 mb-1 print:mb-0">สรุป {drug2Name}:</p>
                                <p>จำนวนวันทานยา: {takeDaysCount2} วัน</p>
                                <p>จำนวนยาทั้งหมด: {displayTotalPills2} เม็ด</p>
                            </div>
                        </div>
                    )}

                    <div className="mt-2 pt-2 border-t print:mt-1 print:pt-1">
                        {isCombined ? (
                            <div className="space-y-1 text-sm print:text-sm print:space-y-0">
                                <p><strong>วิธีรับประทาน {drugName}:</strong> <span className="text-blue-700">{mealInfo || ''}</span></p>
                                <p><strong>วิธีรับประทาน {drug2Name}:</strong> <span className="text-green-700">{mealInfo2 || ''}</span></p>
                            </div>
                        ) : (
                            <p className="text-base print:text-sm"><strong>วิธีรับประทานยา:</strong> {mealInfo || ''}</p>
                        )}
                    </div>

                    {pharmacistNotes && (
                        <div className="mt-2 pt-2 border-t print:mt-1 print:pt-1">
                            <p className="text-sm print:text-xs"><strong>คำแนะนำเพิ่มเติม:</strong> {pharmacistNotes}</p>
                        </div>
                    )}
                    <p className="text-right text-xs pt-2 text-gray-600 print:hidden"><strong>วันที่พิมพ์:</strong> {formatDate(new Date())}</p>
                </div>
            );
        };

        const CalendarFooter = ({ nextAppointment }) => (
            <div className="mt-4 flex flex-wrap justify-between items-start gap-4 print:mt-1">
                <div className="flex flex-wrap gap-x-4 gap-y-2 text-sm print:hidden">
                    <h4 className="font-bold w-full sm:w-auto">สัญลักษณ์:</h4>
                    <div className="flex items-center"><div className="w-4 h-4 bg-green-100 border border-green-300 mr-2 rounded"></div><span>ทานยา</span></div>
                    <div className="flex items-center"><div className="w-4 h-4 bg-red-100 border border-red-300 mr-2 rounded"></div><span>หยุดยา</span></div>
                    <div className="flex items-center"><div className="w-4 h-4 bg-blue-100 border border-blue-300 mr-2 rounded"></div><span>วันรับยา</span></div>
                    <div className="flex items-center"><div className="w-4 h-4 bg-slate-100 border border-slate-300 mr-2 rounded"></div><span>วันหยุด</span></div>
                </div>
                {nextAppointment && (
                <div className="text-right p-2 bg-yellow-100 border border-yellow-300 rounded-md print:border-2 print:border-black print:p-1">
                    <p className="font-bold text-yellow-800 print:text-sm">วันนัดรับยาครั้งถัดไป:</p>
                    <p className="text-lg font-semibold text-red-600 print:text-base">{formatDate(nextAppointment)}</p>
                </div>
                )}
            </div>
        );

        // Sub-component สำหรับ Render รายการยาในช่องปฏิทิน
        const TimingList = ({ drugData, templateTimings, isCombined, colorClass = "border-current" }) => {
            if (!drugData) return <div className="text-[10px] text-gray-500 italic text-center py-1 mt-0.5 bg-gray-50 bg-opacity-50 rounded print:py-0 print:text-[8px]">-- นอกรอบยา --</div>;
            
            if (drugData.type === 'stop') {
                return (
                    <div className={`mt-0.5 print:mt-0 space-y-0.5 print:space-y-0 text-left flex items-center ${isCombined ? 'text-[10px] print:text-[12px]' : 'text-sm print:text-base'}`}>
                        <div className={`w-3 h-3 border mr-1 day-checkbox bg-gray-200 ${colorClass}`}></div>
                        <span className="font-bold text-gray-600">หยุด</span>
                    </div>
                );
            }
            
            if (drugData.type === 'take') {
                return (
                    <div className={`mt-0.5 print:mt-0 space-y-0.5 print:space-y-0 text-left w-full ${isCombined ? 'text-[10px] print:text-[12px] leading-none' : 'text-sm print:text-base leading-none'}`}>
                        {['morning', 'noon', 'evening', 'bedtime'].map(time => {
                            const data = drugData.timings?.[time];
                            const master = templateTimings?.[time];
                            const isActive = data && data.checked && data.pills;
                            const isMasterActive = master && master.checked; 

                            if (isActive) {
                                const label = { morning: 'เช้า', noon: 'กลางวัน', evening: 'เย็น', bedtime: 'ก่อนนอน' }[time];
                                return (
                                    <div key={time} className="flex items-center w-full">
                                        <div className={`w-3 h-3 border mr-1 day-checkbox flex-shrink-0 ${colorClass}`}></div>
                                        <span>{label}</span>
                                        <span className="ml-auto whitespace-nowrap font-medium">{data.pills} เม็ด</span>
                                    </div>
                                );
                            } else if (isMasterActive && !isCombined) { // ซ่อน Placeholder ถ้ายาคู่ (ประหยัดพื้นที่)
                                const label = { morning: 'เช้า', noon: 'กลางวัน', evening: 'เย็น', bedtime: 'ก่อนนอน' }[time];
                                return (
                                    <div key={time} className="flex items-center invisible">
                                        <div className="w-3 h-3 border border-current mr-1 day-checkbox"></div>
                                        <span>{label}</span><span className="ml-auto">0 เม็ด</span>
                                    </div>
                                );
                            }
                            return null;
                        })}
                    </div>
                );
            }
            return null;
        };

        const DayCell = ({ dayOfMonth, dayData, mealRelationText, currentDate, isNonEventHoliday, templateTimings, isCombinedGroup }) => {
            const dayOfWeek = currentDate.getDay();
            const dayColors = [
                'bg-red-100',      // 0: Sunday
                'bg-yellow-100',   // 1: Monday
                'bg-pink-100',     // 2: Tuesday
                'bg-emerald-100',  // 3: Wednesday
                'bg-orange-100',   // 4: Thursday
                'bg-sky-100',      // 5: Friday
                'bg-purple-100'    // 6: Saturday
            ];
            
            let bgColor = dayColors[dayOfWeek];
            let textColor = (dayOfWeek === 0 || dayOfWeek === 6) ? 'text-slate-600' : 'text-black';

            if (dayData && dayData.type === 'appointment') {
                textColor = 'text-blue-800';
            }
            
            // ปรับขนาด DayCell ตามรูปแบบยาเดี่ยว/ยาคู่ (บีบความสูงลงเวลา Print)
            const cellHeight = isCombinedGroup ? "h-auto min-h-[9rem] print:min-h-[3.0cm]" : "h-28 print:min-h-[2.5cm]";
            const finalClassName = `border rounded-md p-1 print:p-0.5 flex flex-col ${bgColor} ${textColor} ${cellHeight} overflow-hidden relative`;
            
            return (
                <div data-day-type={dayData?.type} className={finalClassName}>
                    <div className="flex justify-between font-bold text-xs shrink-0 print:text-[12px]">
                        <span className="truncate pr-1">{(!isCombinedGroup && dayData?.type === 'take') ? mealRelationText : ''}</span>
                        <span>{dayOfMonth}</span>
                    </div>
                    
                    {isNonEventHoliday && (
                        <div className="absolute inset-0 flex items-center justify-center opacity-30 pointer-events-none print:hidden">
                            <HolidayIcon />
                        </div>
                    )}
                    
                    {!dayData && !isNonEventHoliday && <div className="flex-grow"></div>}


                    {dayData?.type === 'appointment' && (
                        <div className="flex-grow flex items-center justify-center font-bold text-sm">
                            วันรับยา
                        </div>
                    )}

                    {/* การแสดงผลกรณียาคู่ (Group 6) */}
                    {dayData && dayData.isCombined && (
                        <div className="flex flex-col flex-grow w-full mt-1 print:mt-0">
                            {/* ยาตัวที่ 1 */}
                            <div className="mb-1 pb-1 print:mb-0 print:pb-0.5 border-b border-gray-400 border-opacity-30 w-full flex-1">
                                <div className="text-[10px] font-bold text-blue-800 truncate mb-0.5 print:mb-0 print:text-[11px]">{dayData.drug1Name}</div>
                                <TimingList drugData={dayData.drug1} templateTimings={templateTimings?.drug1} isCombined={true} colorClass="border-blue-600 bg-blue-50 print:bg-transparent" />
                            </div>
                            {/* ยาตัวที่ 2 */}
                            <div className="w-full flex-1 pt-0.5 print:pt-0">
                                <div className="text-[10px] font-bold text-green-800 truncate mb-0.5 print:mb-0 print:text-[11px]">{dayData.drug2Name}</div>
                                <TimingList drugData={dayData.drug2} templateTimings={templateTimings?.drug2} isCombined={true} colorClass="border-green-600 bg-green-50 print:bg-transparent" />
                            </div>
                        </div>
                    )}

                    {/* การแสดงผลกรณียาเดี่ยว (Group 1-5) */}
                    {dayData && !dayData.isCombined && (
                         <TimingList drugData={dayData} templateTimings={templateTimings} isCombined={false} />
                    )}
                </div>
            );
        };

        const Calendar = ({ month, year, markedDays, mealRelationText, templateTimings, isCombinedGroup }) => {
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDayOfMonth = new Date(year, month, 1).getDay();
            
            const thaiMonth = new Date(year, month).toLocaleDateString('th-TH', { month: 'long' });
            const monthName = `${thaiMonth} ${year + 543}`;

            const calendarGrid = [];
            for (let i = 0; i < firstDayOfMonth; i++) { calendarGrid.push(<div key={`empty-${i}`} className="border rounded-md p-1 print:p-0.5"></div>); }

            for (let day = 1; day <= daysInMonth; day++) {
                const currentDate = new Date(year, month, day);
                const dateString = dateToYYYYMMDD(currentDate);
                const mark = markedDays.find(d => d.date === dateString);
                
                const isNonEventHoliday = !mark && (isWeekend(currentDate) || isHoliday(currentDate));

                calendarGrid.push(
                    <DayCell 
                        key={day}
                        dayOfMonth={day}
                        dayData={mark}
                        mealRelationText={mealRelationText}
                        currentDate={currentDate}
                        isNonEventHoliday={isNonEventHoliday}
                        templateTimings={templateTimings}
                        isCombinedGroup={isCombinedGroup}
                    />
                );
            }

            return (
                <div className="p-4 bg-white rounded-lg shadow-none print:p-0">
                    <h3 className="text-xl font-bold text-center mb-4 print:text-base print:mb-3">{monthName}</h3>
                    <div className="grid grid-cols-7 gap-2 text-center font-semibold mb-2 print:text-xs print:gap-1 print:mb-1">
                        <div className="text-red-500">อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div className="text-red-500">ส</div>
                    </div>
                    <div className="grid grid-cols-7 gap-1">{calendarGrid}</div>
                </div>
            );
        };
        
        const ChemoCalendarApp = () => {
            const [hn, setHn] = useState('');
            const [firstName, setFirstName] = useState('');
            const [lastName, setLastName] = useState('');
            const [selectedDrugId, setSelectedDrugId] = useState('');
            
            // --- States สำหรับยาหลัก (และใช้เป็น default สำหรับ Group 1-5) ---
            const [formData, setFormData] = useState({});
            const [dispensedPills, setDispensedPills] = useState('');
            const [startFromEvening, setStartFromEvening] = useState(false);
            const [currentCycle, setCurrentCycle] = useState(1);
            const [calcMethod, setCalcMethod] = useState('cycles'); 
            const [adjustByDispensed1, setAdjustByDispensed1] = useState(false);
            
            // --- States สำหรับยารอง (ใช้เฉพาะ Group 6) ---
            const [formData2, setFormData2] = useState({});
            const [dispensedPills2, setDispensedPills2] = useState('');
            const [startFromEvening2, setStartFromEvening2] = useState(false);
            const [currentCycle2, setCurrentCycle2] = useState(1);
            const [calcMethod2, setCalcMethod2] = useState('cycles');
            const [adjustByDispensed2, setAdjustByDispensed2] = useState(false);

            // --- States ส่วนกลาง ---
            const [freestyleConfig, setFreestyleConfig] = useState({ subDrugId: '', onDays: '', offDays: '' });
            const [calendarDays, setCalendarDays] = useState([]);
            const [nextAppointment, setNextAppointment] = useState(null);
            const [error, setError] = useState('');
            const [month, setMonth] = useState(new Date().getMonth());
            const [year, setYear] = useState(new Date().getFullYear());
            const [monthsToPrint, setMonthsToPrint] = useState([]);
            const [appointmentDateInput, setAppointmentDateInput] = useState('');
            const [pharmacistNotes, setPharmacistNotes] = useState('');

            const selectedDrug = useMemo(() => DRUGS_DATA.find(d => d.id === parseInt(selectedDrugId)), [selectedDrugId]);
            const groupType = selectedDrug?.group;
            
            const resetFullForm = useCallback(() => {
                setHn('');
                setFirstName('');
                setLastName('');
                setSelectedDrugId(''); 
                setPharmacistNotes('');
                setDispensedPills(''); 
                setDispensedPills2('');
            }, []);

            const getInitialFormState = () => ({ 
                mealRelations: { before: false, after: true, with: false }, 
                timings: { morning: { checked: false, pills: '' }, noon: { checked: false, pills: '' }, evening: { checked: false, pills: '' }, bedtime: { checked: false, pills: '' } }, 
                startDate: '', endDate: '', numberOfDays: '', on: '', off: '', cycles: '', interval: '' 
            });

            const resetRegimenForm = useCallback(() => {
                setFormData(getInitialFormState());
                setFormData2(getInitialFormState());
                setFreestyleConfig({ subDrugId: '', onDays: '', offDays: '' });
                setCalendarDays([]);
                setNextAppointment(null);
                setMonthsToPrint([]);
                setAppointmentDateInput('');
                setCalcMethod('cycles');
                setCalcMethod2('cycles');
                setStartFromEvening(false);
                setStartFromEvening2(false);
                setCurrentCycle(1);
                setCurrentCycle2(1);
                setDispensedPills('');
                setDispensedPills2('');
                setAdjustByDispensed1(false);
                setAdjustByDispensed2(false);
            }, []);
            
            useEffect(() => {
                resetRegimenForm();
                if (selectedDrug) {
                    // Setup defaults for single drug groups
                    if (selectedDrug.group === 2 && (selectedDrug.autoOn || selectedDrug.autoOff)) {
                        setFormData(prev => ({ ...prev, on: selectedDrug.autoOn || '', off: selectedDrug.autoOff || '' }));
                    }
                    if (selectedDrug.group === 3 && selectedDrug.defaultInterval) {
                         setFormData(prev => ({ ...prev, interval: selectedDrug.defaultInterval }));
                    }
                    
                    // Setup defaults for combined group
                    if (selectedDrug.group === 6) {
                        if (selectedDrug.drug1.group === 2 && (selectedDrug.drug1.autoOn || selectedDrug.drug1.autoOff)) {
                            setFormData(prev => ({ ...prev, on: selectedDrug.drug1.autoOn || '', off: selectedDrug.drug1.autoOff || '' }));
                        }
                        if (selectedDrug.drug2.group === 2 && (selectedDrug.drug2.autoOn || selectedDrug.drug2.autoOff)) {
                            setFormData2(prev => ({ ...prev, on: selectedDrug.drug2.autoOn || '', off: selectedDrug.drug2.autoOff || '' }));
                        }
                    }
                }
            }, [selectedDrugId, resetRegimenForm]);
            
            // สร้าง Handler กลางที่รับ parameter ว่ากำลังอัปเดตฟอร์มไหน
            const createFormHandler = (formSetter, isDrug1) => (e) => {
                const { name, value, type, checked } = e.target;
                const mealRelationKeys = ['before', 'after', 'with'];
                const timingKeys = ['morning', 'noon', 'evening', 'bedtime'];

                if (name.startsWith('freestyle')) {
                    const keyMap = { freestyleSubDrugId: 'subDrugId', freestyleOnDays: 'onDays', freestyleOffDays: 'offDays' };
                    setFreestyleConfig(prev => ({...prev, [keyMap[name]]: value}));
                } else if (type === 'checkbox') {
                    if (mealRelationKeys.includes(name)) {
                        formSetter(prev => ({ ...prev, mealRelations: { ...prev.mealRelations, [name]: checked }}));
                    } else if (timingKeys.includes(name)) { 
                        formSetter(prev => {
                            const newTimings = { ...prev.timings };
                            newTimings[name].checked = checked;
                            if (!checked) { 
                                newTimings[name].pills = '';
                            }
                            return { ...prev, timings: newTimings };
                        });
                    }
                } else if (e.target.dataset.timing) { 
                    const time = e.target.dataset.timing;
                    formSetter(prev => ({
                        ...prev,
                        timings: { ...prev.timings, [time]: { ...prev.timings[time], pills: value } }
                    }));
                }
                else {
                    if (name === 'startDate' && value) {
                        const newStartDate = parseLocalDate(value);
                        if (newStartDate) {
                            setMonth(newStartDate.getMonth());
                            setYear(newStartDate.getFullYear());
                        }
                        
                        // Auto-sync startDate from Drug 1 to Drug 2 for convenience
                        if (isDrug1 && groupType === 6) {
                            setFormData2(prev => {
                                if (!prev.startDate) return { ...prev, startDate: value };
                                return prev;
                            });
                        }
                    }
                    formSetter(prev => ({ ...prev, [name]: value }));
                }
            };

            const handleInputChange = createFormHandler(setFormData, true);
            const handleInputChange2 = createFormHandler(setFormData2, false);
            
            const generateMealInfoText = (form) => {
                const timingsText = Object.entries(form.timings || {})
                    .filter(([_, timingData]) => timingData.checked && parseInt(timingData.pills) > 0)
                    .map(([time, timingData]) => {
                        const label = { morning: 'เช้า', noon: 'กลางวัน', evening: 'เย็น', bedtime: 'ก่อนนอน' }[time];
                        return `${label} ${timingData.pills} เม็ด`;
                    })
                    .join(', ');

                const relations = Object.keys(form.mealRelations || {})
                    .filter(key => form.mealRelations[key])
                    .map(key => ({ before: 'ก่อนอาหาร', after: 'หลังอาหาร', with: 'พร้อมอาหาร' }[key]))
                    .join(' ');
                
                return `${timingsText} ${relations}`.trim();
            };

            const getMealInfoText = () => generateMealInfoText(formData);
            const getMealInfoText2 = () => generateMealInfoText(formData2);

            const getMealRelationText = (form) => {
                 return Object.keys(form.mealRelations || {})
                    .filter(key => form.mealRelations[key])
                    .map(key => ({ before: 'ก่อนอาหาร', after: 'หลังอาหาร', with: 'พร้อมอาหาร' }[key]))
                    .join(' ');
            }
            
            const getDrugNameForDisplay = () => {
                if (!selectedDrug) return 'N/A';
                if (groupType === 6) return selectedDrug.drug1.name;
                
                let name = selectedDrug.name;
                if (groupType === 5 && freestyleConfig.subDrugId) {
                    const subDrug = DRUGS_DATA.find(d => d.id === parseInt(freestyleConfig.subDrugId));
                    name = `${selectedDrug.name} (${subDrug?.name || ''})`;
                }
                if (groupType === 2 && currentCycle) {
                    name += ` cycle: ${currentCycle}`;
                }
                return name;
            };

            const getDrug2NameForDisplay = () => {
                if (!selectedDrug || groupType !== 6) return '';
                return selectedDrug.drug2.name;
            }

            // --- Function สำหรับตัด/ลด วันในปฏิทินหากเลือก "ปรับตามยาที่แพทย์สั่ง" ---
            const applyDispensedLimit = (days, dispensedAmount, adjustFlag) => {
                if (!adjustFlag || !dispensedAmount || isNaN(parseInt(dispensedAmount))) return days;
                let remaining = parseInt(dispensedAmount);
                const result = [];
                
                for (const day of days) {
                    if (remaining <= 0) break;

                    if (day.type === 'take') {
                        // Deep copy เพื่อไม่ให้กระทบ Object ต้นฉบับ
                        const dayCopy = { ...day, timings: JSON.parse(JSON.stringify(day.timings || {})) };
                        
                        // เช็คก่อนว่าวันนั้นมีการระบุวิธีกินยาไหม ถ้าไม่ได้ระบุเลยให้ข้ามการหักลบไปก่อน
                        const pillsNeededTotal = Object.values(dayCopy.timings).reduce((sum, t) => sum + (t.checked ? (parseInt(t.pills) || 0) : 0), 0);
                        if (pillsNeededTotal === 0) {
                            result.push(dayCopy);
                            continue;
                        }

                        let dayHasPills = false;
                        // เช็คและหักลบเม็ดยาเรียงตามลำดับเวลาใน 1 วัน (เช้า -> ก่อนนอน)
                        const timeOrder = ['morning', 'noon', 'evening', 'bedtime'];
                        for (const time of timeOrder) {
                            if (dayCopy.timings[time] && dayCopy.timings[time].checked) {
                                const pills = parseInt(dayCopy.timings[time].pills) || 0;
                                if (pills > 0) {
                                    if (remaining >= pills) {
                                        remaining -= pills;
                                        dayHasPills = true;
                                    } else if (remaining > 0) {
                                        // กรณียาเหลือเศษไม่พอมื้อเต็มๆ ให้ใส่เท่าที่เหลือ
                                        dayCopy.timings[time].pills = remaining.toString();
                                        remaining = 0;
                                        dayHasPills = true;
                                    } else {
                                        // ยาหมดแล้ว ยกเลิกมื้อนี้ทิ้งไป
                                        dayCopy.timings[time].checked = false;
                                        dayCopy.timings[time].pills = '';
                                    }
                                }
                            }
                        }

                        // ถ้าในวันนั้นยังมียาเหลือให้กินในมื้อใดมื้อหนึ่ง ให้ดันเข้าปฏิทิน
                        if (dayHasPills) {
                            result.push(dayCopy);
                        }
                    } else {
                        // วันหยุด หรือ วันนัด
                        result.push(day);
                    }
                }
                
                // ลบวันหยุด (stop) ที่อยู่ท้ายสุดออกไปเพื่อไม่ให้ปฏิทินดูยาวเกินความจำเป็นหลังจากยาหมด
                while(result.length > 0 && result[result.length - 1].type === 'stop') {
                    result.pop();
                }
                
                return result;
            };

            // --- Logic คำนวณวันจ่ายยาที่ถูกแยกส่วนออกมาให้ Reuse ได้ ---
            const calculateRegimenDays = (targetGroup, targetForm, targetStartEvening, targetCalcMethod, complexFlag, adjustFlag) => {
                let regimenDays = [];
                const { startDate, endDate, numberOfDays, on, off, cycles, interval, timings } = targetForm;
                const startObj = parseLocalDate(startDate);
                const endObj = parseLocalDate(endDate);

                switch (targetGroup) {
                    case 1: // Continuous
                        if (!startDate) throw new Error("Incomplete");
                        if (!adjustFlag && !numberOfDays) throw new Error("Incomplete");
                        // หากมีการปรับแต่ง (adjustFlag=true) ให้รันเผื่อไป 5 ปี แล้วให้ applyDispensedLimit เป็นตัวตัดจบ
                        let maxDays1 = adjustFlag ? 1825 : parseInt(numberOfDays);
                        let current = new Date(startObj);
                        for (let i = 0; i < maxDays1; i++) {
                            regimenDays.push({ date: dateToYYYYMMDD(current), type: 'take', timings: timings });
                            current.setDate(current.getDate() + 1);
                        }
                        break;
                    case 3: // Interval
                        if (!startDate) throw new Error("Incomplete");
                        if (!adjustFlag && !endDate) throw new Error("Incomplete");
                        let currentGroup3 = new Date(startObj);
                        const endGroup3 = adjustFlag ? new Date(startObj.getTime() + 1825 * 24 * 60 * 60 * 1000) : new Date(endObj);
                        const step = parseInt(interval) || 1;

                        while (currentGroup3 <= endGroup3) { 
                            regimenDays.push({ date: dateToYYYYMMDD(currentGroup3), type: 'take', timings: timings }); 
                            currentGroup3.setDate(currentGroup3.getDate() + step); 
                            if (regimenDays.length > 1825) break;
                        }
                        break;
                    case 2: // Cycles
                        if (complexFlag) {
                            if (!startDate) throw new Error("Incomplete");
                            if (!adjustFlag && !cycles) throw new Error("Incomplete");
                            let cycleStartComplex = new Date(startObj);
                            let limitComplex = adjustFlag ? 99 : parseInt(cycles);
                            for (let i = 0; i < limitComplex; i++) {
                                for (let d = 0; d < 5; d++) { regimenDays.push({ date: dateToYYYYMMDD(cycleStartComplex), type: 'take', timings: timings }); cycleStartComplex.setDate(cycleStartComplex.getDate() + 1); }
                                for (let d = 0; d < 2; d++) { regimenDays.push({ date: dateToYYYYMMDD(cycleStartComplex), type: 'stop' }); cycleStartComplex.setDate(cycleStartComplex.getDate() + 1); }
                                for (let d = 0; d < 5; d++) { regimenDays.push({ date: dateToYYYYMMDD(cycleStartComplex), type: 'take', timings: timings }); cycleStartComplex.setDate(cycleStartComplex.getDate() + 1); }
                                for (let d = 0; d < 16; d++) { regimenDays.push({ date: dateToYYYYMMDD(cycleStartComplex), type: 'stop' }); cycleStartComplex.setDate(cycleStartComplex.getDate() + 1); }
                            }
                        } else {
                            if (!startDate || !on || !off) throw new Error("Incomplete");
                            if (!adjustFlag && targetCalcMethod === 'cycles' && !cycles) throw new Error("Incomplete");
                            if (!adjustFlag && targetCalcMethod === 'date' && !endDate) throw new Error("Incomplete");

                            let cycleStart = new Date(startObj);
                            const onDays = parseInt(on);
                            const offDays = parseInt(off);
                            let loopLimit = adjustFlag ? 999 : (targetCalcMethod === 'cycles' ? parseInt(cycles) : 999); 
                            const limitDate = (!adjustFlag && targetCalcMethod === 'date') ? new Date(endObj) : null;

                            for (let i = 0; i < loopLimit; i++) {
                                if (limitDate && cycleStart > limitDate) break;

                                for (let d = 0; d < onDays; d++) { 
                                    if (limitDate && cycleStart > limitDate) break; 
                                    regimenDays.push({ date: dateToYYYYMMDD(cycleStart), type: 'take', timings: timings }); 
                                    cycleStart.setDate(cycleStart.getDate() + 1); 
                                }
                                for (let d = 0; d < offDays; d++) { 
                                    if (limitDate && cycleStart > limitDate) break;
                                    regimenDays.push({ date: dateToYYYYMMDD(cycleStart), type: 'stop' }); 
                                    cycleStart.setDate(cycleStart.getDate() + 1); 
                                }
                                
                                if (regimenDays.length > 1825) break; 
                            }
                        }
                        break;
                    case 4: // Weekdays only
                        if (!startDate) throw new Error("Incomplete");
                        if (!adjustFlag && !endDate) throw new Error("Incomplete");
                        let currentGroup4 = new Date(startObj);
                        const endGroup4 = adjustFlag ? new Date(startObj.getTime() + 1825 * 24 * 60 * 60 * 1000) : new Date(endObj);
                        
                        while (currentGroup4 <= endGroup4) {
                            const dayOfWeek = currentGroup4.getDay();
                            if (dayOfWeek >= 1 && dayOfWeek <= 5 && !isHoliday(currentGroup4)) {
                                regimenDays.push({ date: dateToYYYYMMDD(currentGroup4), type: 'take', timings: timings });
                            } else {
                                regimenDays.push({ date: dateToYYYYMMDD(currentGroup4), type: 'stop' });
                            }
                            currentGroup4.setDate(currentGroup4.getDate() + 1);
                            if (regimenDays.length > 1825) break;
                        }
                        break;
                    case 5: // Freestyle
                        const { subDrugId, onDays, offDays } = freestyleConfig;
                        if (!subDrugId || !onDays || !offDays || !startDate) throw new Error("Incomplete");
                        let fsCurrent = new Date(startObj);
                        let fsEnd = (!adjustFlag && endDate) ? new Date(endObj) : new Date(startObj.getTime() + 1825 * 24 * 60 * 60 * 1000);
                        
                        while (fsCurrent <= fsEnd) {
                            for (let i = 0; i < parseInt(onDays) && (fsCurrent <= fsEnd); i++) { regimenDays.push({ date: dateToYYYYMMDD(fsCurrent), type: 'take', timings: timings }); fsCurrent.setDate(fsCurrent.getDate() + 1); }
                            for (let i = 0; i < parseInt(offDays) && (fsCurrent <= fsEnd); i++) { regimenDays.push({ date: dateToYYYYMMDD(fsCurrent), type: 'stop' }); fsCurrent.setDate(fsCurrent.getDate() + 1); }
                            if (regimenDays.length > 1825) break;
                        }
                        if (!adjustFlag && endDate) { regimenDays = regimenDays.filter(d => new Date(parseLocalDate(d.date)) <= fsEnd); }
                        break;
                }

                // --- PARTIAL START LOGIC ---
                if (targetStartEvening && regimenDays.length > 0) {
                    const firstTakeIndex = regimenDays.findIndex(d => d.type === 'take');
                    
                    if (firstTakeIndex !== -1) {
                        const originalTimings = JSON.parse(JSON.stringify(timings));
                        const firstDay = regimenDays[firstTakeIndex];
                        const modifiedFirstDayTimings = JSON.parse(JSON.stringify(firstDay.timings));
                        
                        if (modifiedFirstDayTimings.morning) { modifiedFirstDayTimings.morning.checked = false; modifiedFirstDayTimings.morning.pills = ''; }
                        if (modifiedFirstDayTimings.noon) { modifiedFirstDayTimings.noon.checked = false; modifiedFirstDayTimings.noon.pills = ''; }
                        
                        regimenDays[firstTakeIndex] = { ...firstDay, timings: modifiedFirstDayTimings };

                        const compensationTimings = JSON.parse(JSON.stringify(originalTimings));
                        if (compensationTimings.evening) { compensationTimings.evening.checked = false; compensationTimings.evening.pills = ''; }
                        if (compensationTimings.bedtime) { compensationTimings.bedtime.checked = false; compensationTimings.bedtime.pills = ''; }
                        
                        if (originalTimings.morning?.checked || originalTimings.noon?.checked) {
                            const lastTakeIndex = regimenDays.map((d, i) => d.type === 'take' ? i : -1).reduce((max, i) => Math.max(max, i), -1);
                            
                            if (lastTakeIndex !== -1) {
                                const lastTakeDateStr = regimenDays[lastTakeIndex].date;
                                let nextDate = parseLocalDate(lastTakeDateStr);
                                do {
                                    nextDate.setDate(nextDate.getDate() + 1);
                                } while (
                                    targetGroup === 4 && (isWeekend(nextDate) || isHoliday(nextDate))
                                );
                                
                                const compensationDay = { date: dateToYYYYMMDD(nextDate), type: 'take', timings: compensationTimings };
                                const existingDayIndex = regimenDays.findIndex(d => d.date === compensationDay.date);
                                
                                if (existingDayIndex !== -1) {
                                    regimenDays[existingDayIndex] = compensationDay;
                                } else {
                                    regimenDays.push(compensationDay);
                                }
                            }
                        }
                    }
                }

                return regimenDays;
            };

            useEffect(() => {
                if (!hn.trim() || !firstName.trim() || !lastName.trim() || !selectedDrugId) {
                    setCalendarDays([]);
                    setMonthsToPrint([]);
                    setError('');
                    return;
                }
                
                try {
                    setError('');
                    let finalRegimenDays = [];

                    // FIX BUG: ตรวจสอบว่ามีช่องกรอกยาที่จ่ายจริงไหม ถึงจะให้ระบบ Adjust ทำงาน (ป้องกันลบเลขออกแล้วค้าง)
                    const activeAdjust1 = adjustByDispensed1 && dispensedPills && !isNaN(parseInt(dispensedPills)) && parseInt(dispensedPills) > 0;
                    const activeAdjust2 = adjustByDispensed2 && dispensedPills2 && !isNaN(parseInt(dispensedPills2)) && parseInt(dispensedPills2) > 0;

                    if (groupType === 6) {
                        // --- Logic Group 6 (Merged Calendar) ---
                        let days1 = [];
                        let days2 = [];
                        
                        try {
                            days1 = calculateRegimenDays(selectedDrug.drug1.group, formData, startFromEvening, calcMethod, false, activeAdjust1);
                        } catch (e) {
                            if (e.message !== "Incomplete") throw e;
                        }

                        try {
                            days2 = calculateRegimenDays(selectedDrug.drug2.group, formData2, startFromEvening2, calcMethod2, false, activeAdjust2);
                        } catch (e) {
                            if (e.message !== "Incomplete") throw e;
                        }
                        
                        // ประยุกต์ใช้การตัด/เพิ่มจำนวนวันตามยาที่สั่งจ่าย
                        days1 = applyDispensedLimit(days1, dispensedPills, activeAdjust1);
                        days2 = applyDispensedLimit(days2, dispensedPills2, activeAdjust2);
                        
                        const mergedMap = {};
                        [...days1, ...days2].forEach(d => {
                            if (!mergedMap[d.date]) {
                                mergedMap[d.date] = {
                                    date: d.date,
                                    type: 'take', // default base
                                    isCombined: true,
                                    drug1Name: selectedDrug.drug1.name,
                                    drug2Name: selectedDrug.drug2.name,
                                    drug1: null,
                                    drug2: null
                                };
                            }
                        });

                        days1.forEach(d => { if(mergedMap[d.date]) mergedMap[d.date].drug1 = d; });
                        days2.forEach(d => { if(mergedMap[d.date]) mergedMap[d.date].drug2 = d; });

                        finalRegimenDays = Object.values(mergedMap);

                    } else {
                        // --- Logic Group 1-5 (Single Calendar) ---
                        finalRegimenDays = calculateRegimenDays(groupType, formData, startFromEvening, calcMethod, selectedDrug.isComplex, activeAdjust1);
                        // ประยุกต์ใช้การตัด/เพิ่มจำนวนวันตามยาที่สั่งจ่าย
                        finalRegimenDays = applyDispensedLimit(finalRegimenDays, dispensedPills, activeAdjust1);
                    }

                    // --- Add Appointment Logic ---
                    if (appointmentDateInput) {
                        const apptDate = parseLocalDate(appointmentDateInput);
                        if (apptDate) {
                            const dateStr = dateToYYYYMMDD(apptDate);
                            const exists = finalRegimenDays.find(d => d.date === dateStr);
                            if (exists) {
                                exists.type = 'appointment'; 
                            } else {
                                finalRegimenDays.push({ date: dateStr, type: 'appointment', isCombined: groupType === 6 });
                            }
                            setNextAppointment(apptDate);
                        } else {
                            setNextAppointment(null);
                        }
                    } else {
                        setNextAppointment(null);
                    }

                    setCalendarDays(finalRegimenDays.sort((a, b) => a.date.localeCompare(b.date)));

                } catch (e) {
                    if (e.message !== "Incomplete") setError(e.message);
                    setCalendarDays([]);
                }
            }, [hn, firstName, lastName, selectedDrugId, formData, formData2, freestyleConfig, appointmentDateInput, calcMethod, calcMethod2, startFromEvening, startFromEvening2, currentCycle, currentCycle2, dispensedPills, dispensedPills2, adjustByDispensed1, adjustByDispensed2]);
            
            useEffect(() => {
                const printMonths = [];
                if (calendarDays.length > 0) {
                    const allDates = calendarDays.map(d => parseLocalDate(d.date));
                    const calStartDate = new Date(Math.min.apply(null, allDates));
                    const calEndDate = new Date(Math.max.apply(null, allDates));
                    let currentMonth = new Date(calStartDate.getFullYear(), calStartDate.getMonth(), 1);
                    const lastMonth = new Date(calEndDate.getFullYear(), calEndDate.getMonth(), 1);
                    while(currentMonth <= lastMonth) {
                        printMonths.push({month: currentMonth.getMonth(), year: currentMonth.getFullYear()});
                        currentMonth.setMonth(currentMonth.getMonth() + 1);
                    }
                }
                setMonthsToPrint(printMonths);
            }, [calendarDays]);

            // Helper function คำนวณยาสำหรับ 1 ฟอร์ม
            const calculatePillsStats = (targetDaysArray, targetTimings) => {
                const targetPillsPerDay = Object.values(targetTimings || {}).reduce((sum, timingData) => sum + (timingData.checked ? (parseInt(timingData.pills) || 0) : 0), 0);
                
                if (!targetPillsPerDay || targetDaysArray.length === 0) return { takeDaysCount: 0, totalPills: 0 };
                
                let total = 0;
                let takeCount = 0;
                targetDaysArray.forEach(day => {
                    if (day.type === 'take') {
                        takeCount++;
                        if (day.timings) {
                             total += Object.values(day.timings).reduce((sum, t) => sum + (t.checked ? (parseInt(t.pills) || 0) : 0), 0);
                        } else {
                             total += targetPillsPerDay;
                        }
                    }
                });
                return { takeDaysCount: takeCount, totalPills: total };
            };

            const calculationResults = useMemo(() => {
                if (groupType === 6) {
                    // Extract back individual days for independent count
                    const days1 = calendarDays.filter(d => d.drug1 && d.drug1.type === 'take').map(d => d.drug1);
                    const days2 = calendarDays.filter(d => d.drug2 && d.drug2.type === 'take').map(d => d.drug2);
                    
                    const stats1 = calculatePillsStats(days1, formData.timings);
                    const stats2 = calculatePillsStats(days2, formData2.timings);
                    
                    return {
                        takeDaysCount: stats1.takeDaysCount, totalPills: stats1.totalPills,
                        takeDaysCount2: stats2.takeDaysCount, totalPills2: stats2.totalPills
                    };
                } else {
                    return calculatePillsStats(calendarDays, formData.timings);
                }
            }, [calendarDays, formData.timings, formData2.timings, groupType]);
            useEffect(() => {
                if (groupType === 5 && adjustByDispensed1 && calendarDays.length > 0) {
                    const lastTakeDay = [...calendarDays].reverse().find(d => d.type === 'take');
                    if (lastTakeDay) {
                        if (formData.endDate !== lastTakeDay.date) {
                            setFormData(prev => ({ ...prev, endDate: lastTakeDay.date }));
                        }
                    }
                }
            }, [calendarDays, groupType, adjustByDispensed1, formData.endDate]);

            const handlePrint = () => { setTimeout(() => { window.print(); }, 100); };
            const changeMonth = (delta) => {
              let d = new Date(year, month);
              d.setMonth(d.getMonth() + delta);
              setMonth(d.getMonth()); setYear(d.getFullYear());
            };
            
            const isPatientInfoFilled = hn.trim() && firstName.trim() && lastName.trim();
            const isDrugSelected = !!selectedDrugId;

            // --- Component กล่องฟอร์มกรอกเงื่อนไขแบบ Reuse ---
            const renderConditionForm = (activeGroupType, activeFormData, activeHandler, activeStartEvening, activeSetStartEvening, activeCalcMethod, activeSetCalcMethod, activeCurrentCycle, activeSetCurrentCycle, isComplexFlag, activeAdjustByDispensed) => {
                return (
                    <div className="space-y-4">
                        {activeGroupType === 1 && <>
                            <div className="mb-2">
                                <label className="text-sm font-medium text-gray-600 mb-1 block">วันที่เริ่ม</label>
                                <PatchedDateInput name="startDate" value={activeFormData.startDate || ''} onChange={activeHandler} className="p-2 border rounded w-full" />
                            </div>
                            <div className="mb-2">
                                <label className="text-sm font-medium text-gray-600 mb-1 block">จำนวนวัน</label>
                                <input type="number" name="numberOfDays" value={activeFormData.numberOfDays || ''} onChange={activeHandler} className="p-2 border rounded w-full disabled:bg-gray-100 disabled:text-gray-400" min="0" onWheel={(e) => e.target.blur()} disabled={activeAdjustByDispensed} />
                            </div>
                        </>}
                        
                        {activeGroupType === 3 && <>
                            <div className="mb-2">
                                <label className="text-sm font-medium text-gray-600 mb-1 block">วันที่เริ่ม</label>
                                <PatchedDateInput name="startDate" value={activeFormData.startDate || ''} onChange={activeHandler} className="p-2 border rounded w-full" />
                            </div>
                            <div className="mb-2">
                                <label className="text-sm font-medium text-gray-600 mb-1 block">วันสิ้นสุด</label>
                                <PatchedDateInput name="endDate" value={activeFormData.endDate || ''} onChange={activeHandler} className="p-2 border rounded w-full disabled:bg-gray-100 disabled:text-gray-400" disabled={activeAdjustByDispensed} />
                            </div>
                            <div className="mb-2">
                                <label className="text-sm font-medium text-gray-600 mb-1 block">เว้นระยะ (วัน)</label>
                                <input type="number" name="interval" value={activeFormData.interval || 1} onChange={activeHandler} className="p-2 border rounded w-full" min="1" onWheel={(e) => e.target.blur()} />
                                <span className="text-xs text-gray-500">ใส่ 1 = ทุกวัน, 7 = สัปดาห์ละครั้ง</span>
                            </div>
                        </>}

                        {activeGroupType === 2 && <>
                            <div className="grid grid-cols-2 gap-2 mb-2">
                                <div>
                                    <label className="text-sm font-medium text-gray-600 mb-1 block">วันที่เริ่ม</label>
                                    <PatchedDateInput name="startDate" value={activeFormData.startDate || ''} onChange={activeHandler} className="p-2 border rounded w-full" />
                                </div>
                                <div>
                                    <label className="text-sm font-medium text-gray-600 mb-1 block">รอบที่ (Cycle)</label>
                                    <input type="number" value={activeCurrentCycle} onChange={(e) => activeSetCurrentCycle(e.target.value)} className="p-2 border rounded w-full" min="1" onWheel={(e) => e.target.blur()} />
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-2 mb-2">
                                <div>
                                    <label className="text-sm font-medium text-gray-600 mb-1 block">ทาน (วัน)</label>
                                    <input type="number" name="on" value={activeFormData.on || ''} onChange={activeHandler} className="p-2 border rounded w-full" min="0" onWheel={(e) => e.target.blur()} />
                                </div>
                                <div>
                                    <label className="text-sm font-medium text-gray-600 mb-1 block">หยุด (วัน)</label>
                                    <input type="number" name="off" value={activeFormData.off || ''} onChange={activeHandler} className="p-2 border rounded w-full" min="0" onWheel={(e) => e.target.blur()} />
                                </div>
                            </div>
                            
                            {!isComplexFlag && (
                                <div className="mb-2 p-2 bg-gray-50 border rounded">
                                    <label className="text-sm font-medium text-gray-600 mb-1 block">คำนวณโดย:</label>
                                    <div className="flex space-x-4 mb-2">
                                        <label className={`flex items-center text-sm ${activeAdjustByDispensed ? 'cursor-not-allowed opacity-50' : 'cursor-pointer'}`}>
                                            <input type="radio" name={`calcMethod_${activeGroupType}`} value="cycles" checked={activeCalcMethod === 'cycles'} onChange={() => activeSetCalcMethod('cycles')} className="mr-1" disabled={activeAdjustByDispensed} />
                                            จำนวนรอบ
                                        </label>
                                        <label className={`flex items-center text-sm ${activeAdjustByDispensed ? 'cursor-not-allowed opacity-50' : 'cursor-pointer'}`}>
                                            <input type="radio" name={`calcMethod_${activeGroupType}`} value="date" checked={activeCalcMethod === 'date'} onChange={() => activeSetCalcMethod('date')} className="mr-1" disabled={activeAdjustByDispensed} />
                                            ถึงวันที่
                                        </label>
                                    </div>
                                    
                                    {activeCalcMethod === 'cycles' ? (
                                            <div>
                                            <label className="text-sm font-medium text-gray-600 mb-1 block">จำนวนรอบ</label>
                                            <input type="number" name="cycles" value={activeFormData.cycles || ''} onChange={activeHandler} className="p-2 border rounded w-full disabled:bg-gray-100 disabled:text-gray-400" min="0" onWheel={(e) => e.target.blur()} disabled={activeAdjustByDispensed} />
                                        </div>
                                    ) : (
                                        <div>
                                            <label className="text-sm font-medium text-gray-600 mb-1 block">สิ้นสุดวันที่</label>
                                            <PatchedDateInput name="endDate" value={activeFormData.endDate || ''} onChange={activeHandler} className="p-2 border rounded w-full disabled:bg-gray-100 disabled:text-gray-400" disabled={activeAdjustByDispensed} />
                                        </div>
                                    )}
                                </div>
                            )}
                            
                            {isComplexFlag && (
                                <div>
                                    <label className="text-sm font-medium text-gray-600 mb-1 block">จำนวนรอบ</label>
                                    <input type="number" name="cycles" value={activeFormData.cycles || ''} onChange={activeHandler} className="p-2 border rounded w-full disabled:bg-gray-100 disabled:text-gray-400" min="0" onWheel={(e) => e.target.blur()} disabled={activeAdjustByDispensed} />
                                </div>
                            )}
                        </>}
                        
                        {activeGroupType === 4 && <>
                            <div className="mb-2">
                                <label className="text-sm font-medium text-gray-600 mb-1 block">วันที่เริ่ม</label>
                                <PatchedDateInput name="startDate" value={activeFormData.startDate || ''} onChange={activeHandler} className="p-2 border rounded w-full" />
                            </div>
                            <div className="mb-2">
                                <label className="text-sm font-medium text-gray-600 mb-1 block">วันสิ้นสุด</label>
                                <PatchedDateInput name="endDate" value={activeFormData.endDate || ''} onChange={activeHandler} className="p-2 border rounded w-full disabled:bg-gray-100 disabled:text-gray-400" disabled={activeAdjustByDispensed} />
                            </div>
                        </>}

                        <div className="mt-4 p-3 bg-slate-50 rounded-md border">
                            <label className="block text-gray-700 font-semibold mb-2 text-sm">กำหนดเวลาทานยา</label>
                            
                            <div className="mb-3 p-2 bg-yellow-50 border border-yellow-200 rounded">
                            <label className="flex items-center space-x-2 cursor-pointer">
                                <input 
                                    type="checkbox" 
                                    checked={activeStartEvening} 
                                    onChange={(e) => activeSetStartEvening(e.target.checked)}
                                    className="w-4 h-4 text-blue-600 rounded"
                                />
                                <span className="text-sm font-bold text-gray-800">เริ่มทานมื้อเย็นเป็นมื้อแรก</span>
                            </label>
                            </div>

                            <div className="mb-3">
                                <p className="text-sm font-medium text-gray-600 mb-2">ความสัมพันธ์กับมื้ออาหาร:</p>
                                <div className="grid grid-cols-3 gap-2 text-sm">
                                    {[{key: 'before', label: 'ก่อนอาหาร'}, {key: 'after', label: 'หลังอาหาร'}, {key: 'with', label: 'พร้อมอาหาร'}].map(item => (
                                        <label key={item.key} className="flex items-center space-x-2 p-1.5 bg-white rounded-md border cursor-pointer">
                                            <input type="checkbox" name={item.key} checked={activeFormData.mealRelations?.[item.key] || false} onChange={activeHandler} />
                                            <span>{item.label}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                            <hr className="my-3"/>
                            <div>
                                <p className="text-sm font-medium text-gray-600 mb-2">ช่วงเวลา:</p>
                                <div className="grid grid-cols-2 gap-4 text-sm">
                                    {['morning', 'noon', 'evening', 'bedtime'].map(time => (
                                        <div key={time} className="flex items-center space-x-2">
                                            <input 
                                                type="checkbox" 
                                                name={time} 
                                                checked={activeFormData.timings?.[time]?.checked || false} 
                                                onChange={activeHandler} 
                                                id={`checkbox-${activeGroupType}-${time}`}
                                                className="h-4 w-4 rounded"
                                            />
                                            <label htmlFor={`checkbox-${activeGroupType}-${time}`} className="flex-1 text-gray-700">{{ morning: 'เช้า', noon: 'กลางวัน', evening: 'เย็น', bedtime: 'ก่อนนอน' }[time]}</label>
                                            <input 
                                                type="number" 
                                                data-timing={time}
                                                value={activeFormData.timings?.[time]?.pills || ''} 
                                                onChange={activeHandler} 
                                                className="p-1 border rounded w-16"
                                                placeholder="เม็ด"
                                                disabled={!activeFormData.timings?.[time]?.checked}
                                                min="0"
                                                onWheel={(e) => e.target.blur()}
                                            />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
              <div>
                <header className="bg-white shadow-md p-4 no-print">
                  <div className="container mx-auto"><h1 className="text-3xl font-bold text-gray-800">ระบบจัดทำปฏิทินยาเคมีบำบัด</h1></div>
                </header>
                <main className="container mx-auto p-4">
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                      <div className="lg:col-span-1 bg-white p-6 rounded-lg shadow-lg no-print h-fit">
                          <div className="flex justify-between items-center mb-4">
                            <h2 className="text-2xl font-bold">ข้อมูลผู้ป่วยและยา</h2>
                            <button onClick={resetFullForm} className="text-sm bg-red-500 hover:bg-red-600 text-white font-semibold py-1 px-3 rounded-md transition-colors">เริ่มใหม่</button>
                          </div>
                          <fieldset>
                            <div className="mb-4">
                              <label className="block text-gray-700 font-semibold mb-2">HN ผู้ป่วย</label>
                              <input type="text" value={hn} onChange={(e) => setHn(e.target.value)} className="w-full p-2 border rounded" />
                            </div>
                            <div className="grid grid-cols-2 gap-4 mb-4">
                              <div>
                                  <label className="block text-gray-700 font-semibold mb-2">ชื่อ</label>
                                  <input type="text" value={firstName} onChange={(e) => setFirstName(e.target.value)} className="w-full p-2 border rounded" />
                              </div>
                              <div>
                                  <label className="block text-gray-700 font-semibold mb-2">นามสกุล</label>
                                  <input type="text" value={lastName} onChange={(e) => setLastName(e.target.value)} className="w-full p-2 border rounded" />
                              </div>
                            </div>
                          </fieldset>
                          
                          {!isPatientInfoFilled && (
                            <div className="mt-4 p-3 bg-yellow-100 border-l-4 border-yellow-400 text-yellow-700">
                                <p className="font-bold">ขั้นตอนถัดไป</p>
                                <p>กรุณากรอกข้อมูลผู้ป่วย (HN, ชื่อ, นามสกุล) ให้ครบถ้วน</p>
                            </div>
                          )}

                          <fieldset disabled={!isPatientInfoFilled} className="disabled:opacity-50 disabled:cursor-not-allowed mt-4 space-y-4">
                            <div>
                                <label className="block text-gray-700 font-semibold mb-2">1. เลือกยา/สูตรยา</label>
                                <select value={selectedDrugId} onChange={(e) => setSelectedDrugId(e.target.value)} className="w-full p-2 border rounded bg-white">
                                    <option value="">-- กรุณาเลือก --</option>
                                    {DRUGS_DATA.map(drug => <option key={drug.id} value={drug.id} className={drug.group === 6 ? 'bg-blue-50 font-semibold' : ''}>กลุ่ม {drug.group}: {drug.name}</option>)}
                                </select>
                            </div>
                            
                            {isPatientInfoFilled && !isDrugSelected && (
                                <div className="p-3 bg-yellow-100 border-l-4 border-yellow-400 text-yellow-700">
                                    <p className="font-bold">ขั้นตอนถัดไป</p>
                                    <p>กรุณาเลือกยา/สูตรยา</p>
                                </div>
                            )}
                            
                            {selectedDrug && (
                              <div className="space-y-4">
                                  <div>
                                    <label className="block text-gray-700 font-semibold mb-2 text-lg">2. กำหนดเงื่อนไข</label>
